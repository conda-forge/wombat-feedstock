context:
  version: 0.13.2
  python_min: "3.11"

package:
  name: wombat
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/w/wombat/wombat-${{ version }}.tar.gz
  sha256: 85bcf40e68e86f6de4aac7b93254c84b4fb99bf356493b1678be7b6fef086416

build:
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python
  number: 1

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - setuptools-scm
  - pip
  run:
  - python >=${{ python_min }}
  - attrs >=24.1.0
  - numpy >=1.21
  - scipy >=1.8
  - pandas <3,>=2
  - polars >=1.33.1
  - pyarrow >=10
  - jupyterlab >=3
  - simpy >=4.0.1
  - pyyaml >=6
  - geopy >=2.3
  - networkx >=2.7
  - matplotlib >=3.3
  - types-typed-ast >=1.5
  - types-pyyaml >=6
  - types-python-dateutil >=2.8
  - python-dateutil

tests:
- python:
    imports:
      - wombat
      - wombat.core
      - wombat.utilities
      - wombat.windfarm
- script:
    - pytest tests/ -vvv
  requirements:
      run:
        - pytest >=7
        - pytest-check
        - pytest-cov
        - python ${{ python_min }}.*
  files:
      source:
        - tests/
        - library/

about:
  homepage: https://github.com/NLRWindSystems/WOMBAT/
  summary: Windfarm operations and maintenance cost-benefit analysis tool
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
